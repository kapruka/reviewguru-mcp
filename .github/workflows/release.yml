name: Publish to PyPI on tag

# Pushing a `v*` tag (e.g. v0.1.1) triggers a build + upload to PyPI.
# Usage:
#   bump version in pyproject.toml
#   git commit -am "v0.1.1"
#   git tag v0.1.1
#   git push --follow-tags
#
# Requires repo secret PYPI_TOKEN (set at
# https://github.com/kapruka/reviewguru-mcp/settings/secrets/actions).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install --upgrade build twine

      - name: Sanity-check tag matches pyproject version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg_version=$(grep -E '^version = ' pyproject.toml | head -1 | sed 's/^version = "\(.*\)"/\1/')
          if [ "$tag" != "$pkg_version" ]; then
            echo "Tag $tag does not match pyproject.toml version $pkg_version" >&2
            exit 1
          fi

      - name: Build wheel + sdist
        run: python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload --non-interactive dist/*
